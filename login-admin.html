<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Administrador - Evaluación de Proveedores</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
        }
        
        .login-container h1 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .login-container p {
            color: #666;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        .error-message {
            color: #dc3545;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }
        
        .btn-volver {
            margin-top: 20px;
            padding: 10px 20px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
        }
        
        .btn-volver:hover {
            background: #5a6268;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🔐 Acceso Administrador</h1>
        <p>Ingrese la contraseña para acceder al panel de administración</p>
        
        <form id="loginForm">
             <div class="form-group" style="position: relative;">
                 <label for="password">Contraseña:</label>
                 <div style="position: relative; display: flex; align-items: center; width: 100%;">
                     <input type="password" id="password" placeholder="Ingrese la contraseña" required autofocus style="width: 100%; padding-right: 45px; box-sizing: border-box;">
                      <span id="togglePassword" style="
                          position: absolute;
                          right: 14px;
                          cursor: pointer;
                          color: #64748b;
                          display: flex;
                          align-items: center;
                          justify-content: center;
                          user-select: none;
                      "><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg></span>
                 </div>
             </div>
            
            <button type="submit" class="btn-login">Acceder</button>
            
            <div id="errorMessage" class="error-message">Contraseña incorrecta. Intente nuevamente.</div>
        </form>
        
        <a href="index.html" class="btn-volver">← Volver al Formulario</a>
    </div>

    <!-- Scripts de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/supabase-service.js"></script>
    
    <script>
        // Verificar si ya está autenticado
        if (sessionStorage.getItem('adminAuthenticated') === 'true') {
            window.location.href = 'admin.html';
        }
        
        // Función para mostrar/ocultar contraseña
        document.addEventListener('DOMContentLoaded', function() {
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            
            const eyeOpen = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
            const eyeClosed = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;

            if (togglePassword && passwordInput) {
                togglePassword.innerHTML = eyeClosed; // Asegurar estado inicial (contraseña oculta = ojo tachado)
                togglePassword.addEventListener('click', function () {
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    this.innerHTML = type === 'password' ? eyeClosed : eyeOpen;
                });
            }
        });

        // Esperar a que todos los scripts estén cargados
        async function initLogin() {
            // Esperar a que Supabase esté listo
            await waitForSupabase();
            
            // Verificar que la función esté disponible
            if (typeof validarPasswordAdmin === 'undefined') {
                console.error('❌ La función validarPasswordAdmin no está disponible');
                return;
            }
            
            console.log('✅ Login listo para validar contraseña');
            
            // Configurar el evento del formulario solo cuando todo esté listo
            const loginForm = document.getElementById('loginForm');
            if (loginForm) {
                loginForm.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    
                    const password = document.getElementById('password').value;
                    const errorMessage = document.getElementById('errorMessage');
                    const submitButton = e.target.querySelector('button[type="submit"]');
                    
                    // Deshabilitar botón mientras se valida
                    submitButton.disabled = true;
                    submitButton.textContent = 'Validando...';
                    errorMessage.style.display = 'none';
                    
                    try {
                        // Verificar nuevamente que la función esté disponible
                        if (typeof validarPasswordAdmin === 'undefined') {
                            throw new Error('La función de validación no está disponible. Por favor, recarga la página.');
                        }
                        
                        // Validar contraseña usando la función de Supabase
                        const esValida = await validarPasswordAdmin(password);
                        
                        if (esValida) {
                            // Guardar autenticación en sessionStorage (se cierra al cerrar la pestaña)
                            sessionStorage.setItem('adminAuthenticated', 'true');
                            sessionStorage.setItem('adminPassword', password);
                            sessionStorage.setItem('adminAuthTime', Date.now().toString());
                            window.location.href = 'admin.html';
                        } else {
                            errorMessage.textContent = 'Contraseña incorrecta. Intente nuevamente.';
                            errorMessage.style.display = 'block';
                            document.getElementById('password').value = '';
                            document.getElementById('password').focus();
                        }
                    } catch (error) {
                        console.error('Error al validar contraseña:', error);
                        errorMessage.textContent = 'Error al validar contraseña. Intente nuevamente.';
                        errorMessage.style.display = 'block';
                    } finally {
                        // Rehabilitar botón
                        submitButton.disabled = false;
                        submitButton.textContent = 'Acceder';
                    }
                });
            }
        }
        
        // Inicializar cuando la página esté completamente cargada
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initLogin);
        } else {
            initLogin();
        }
    </script>
</body>
</html>

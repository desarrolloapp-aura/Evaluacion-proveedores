<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Administrador - Evaluación de Proveedores</title>
    <link rel="stylesheet" href="css/style.css">    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Inter', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(circle at 50% 50%, #111827 0%, #030712 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Glowing background decorative blobs */
        .bg-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(130px);
            opacity: 0.15;
            z-index: 1;
            pointer-events: none;
        }
        .bg-glow-1 {
            background: #6366f1;
            top: 15%;
            left: 20%;
        }
        .bg-glow-2 {
            background: #a855f7;
            bottom: 15%;
            right: 20%;
        }
        
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 45px 35px;
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            text-align: center;
            z-index: 10;
            animation: cardAppear 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-container h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a5b4fc 0%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .login-container p {
            color: #9ca3af;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 35px;
        }
        
        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 550;
            font-size: 0.9rem;
            color: #e5e7eb;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(3, 7, 18, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            font-size: 16px;
            color: #f9fafb;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #818cf8;
            background: rgba(3, 7, 18, 0.7);
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.25);
        }

        .form-group input::placeholder {
            color: #6b7280;
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 70, 229, 0.5);
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            background: #374151;
            color: #9ca3af;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .error-message {
            color: #f87171;
            margin-top: 15px;
            font-size: 14px;
            display: none;
            background: rgba(248, 113, 113, 0.1);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(248, 113, 113, 0.2);
        }
        
        .btn-volver {
            margin-top: 25px;
            padding: 10px 20px;
            background: transparent;
            color: #9ca3af;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .btn-volver:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #f3f4f6;
            border-color: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="login-container">
        <h1>🔐 Acceso Administrador</h1>
        <p>Ingrese la contraseña para acceder al panel de administración</p>
        
        <form id="loginForm">
             <div class="form-group" style="position: relative;">
                  <label for="password">Contraseña:</label>
                  <div style="position: relative; display: flex; align-items: center; width: 100%;">
                      <input type="password" id="password" placeholder="Ingrese la contraseña" required autofocus style="width: 100%; padding-right: 45px; box-sizing: border-box;">
                       <span id="togglePassword" style="
                           position: absolute;
                           right: 14px;
                           cursor: pointer;
                           color: #9ca3af;
                           display: flex;
                           align-items: center;
                           justify-content: center;
                           user-select: none;
                           transition: color 0.2s;
                       "><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg></span>
                  </div>
             </div>
            
            <button type="submit" class="btn-login">Acceder</button>
            
            <div id="errorMessage" class="error-message">Contraseña incorrecta. Intente nuevamente.</div>
        </form>
        
        <a href="index.html" class="btn-volver">← Volver al Formulario</a>
    </div>

    <!-- Scripts de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js?v=57"></script>
    <script src="js/supabase-service.js?v=57"></script>
    
    <script>
        // Verificar si ya está autenticado
        if (sessionStorage.getItem('adminAuthenticated') === 'true') {
            window.location.href = 'admin.html';
        }
        
        // Función para mostrar/ocultar contraseña
        document.addEventListener('DOMContentLoaded', function() {
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            
            const eyeOpen = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
            const eyeClosed = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;

            if (togglePassword && passwordInput) {
                togglePassword.innerHTML = eyeClosed; // Asegurar estado inicial (contraseña oculta = ojo tachado)
                togglePassword.addEventListener('click', function () {
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    this.innerHTML = type === 'password' ? eyeClosed : eyeOpen;
                });
            }
        });

        // Esperar a que todos los scripts estén cargados
        async function initLogin() {
            // Esperar a que Supabase esté listo
            await waitForSupabase();
            
            // Verificar que la función esté disponible
            if (typeof validarPasswordAdmin === 'undefined') {
                console.error('❌ La función validarPasswordAdmin no está disponible');
                return;
            }
            
            console.log('✅ Login listo para validar contraseña');
            
            // Configurar el evento del formulario solo cuando todo esté listo
            const loginForm = document.getElementById('loginForm');
            if (loginForm) {
                loginForm.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    
                    const password = document.getElementById('password').value;
                    const errorMessage = document.getElementById('errorMessage');
                    const submitButton = e.target.querySelector('button[type="submit"]');
                    
                    // Deshabilitar botón mientras se valida
                    submitButton.disabled = true;
                    submitButton.textContent = 'Validando...';
                    errorMessage.style.display = 'none';
                    
                    try {
                        // Verificar nuevamente que la función esté disponible
                        if (typeof validarPasswordAdmin === 'undefined') {
                            throw new Error('La función de validación no está disponible. Por favor, recarga la página.');
                        }
                        
                        // Validar contraseña usando la función de Supabase
                        const esValida = await validarPasswordAdmin(password);
                        
                        if (esValida) {
                            // Guardar autenticación en sessionStorage (se cierra al cerrar la pestaña)
                            sessionStorage.setItem('adminAuthenticated', 'true');
                            sessionStorage.setItem('adminPassword', password);
                            sessionStorage.setItem('adminAuthTime', Date.now().toString());
                            window.location.href = 'admin.html';
                        } else {
                            errorMessage.textContent = 'Contraseña incorrecta. Intente nuevamente.';
                            errorMessage.style.display = 'block';
                            document.getElementById('password').value = '';
                            document.getElementById('password').focus();
                        }
                    } catch (error) {
                        console.error('Error al validar contraseña:', error);
                        errorMessage.textContent = 'Error al validar contraseña. Intente nuevamente.';
                        errorMessage.style.display = 'block';
                    } finally {
                        // Rehabilitar botón
                        submitButton.disabled = false;
                        submitButton.textContent = 'Acceder';
                    }
                });
            }
        }
        
        // Inicializar cuando la página esté completamente cargada
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initLogin);
        } else {
            initLogin();
        }
    </script>
</body>
</html>
